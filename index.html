<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vibe Maps</title>

<link rel="manifest" href="manifest.json" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Vibe Maps" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />
<meta name="theme-color" content="#0B1F14" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Mapbox GL JS v3 -->
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>

<style>
/* ========== Design Tokens ========== */
:root {
  --forest-ink: #0B1F14;
  --forest-deep: #12301F;
  --forest-moss: #1E4A33;
  --forest-sage: #3A6E52;
  --lime-signal: #C8FF4C;
  --lime-dim: #9FCF2E;
  --lime-glow: #E5FF8A;
  --paper: #F2EFE6;
  --paper-raised: #FAF7EE;
  --paper-sunken: #E8E4D6;
  --fog-10: #DCD7C6;
  --fog-20: #BEB8A4;
  --fog-40: #8A8576;
  --fog-60: #5C584D;
  --fog-80: #2E2C26;

  --font-display: 'Fraunces', 'Times New Roman', Georgia, serif;
  --font-ui: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --radius-capsule: 9999px;
  --radius-card: 20px;
  --radius-sheet: 28px;
  --radius-button: 14px;
  --radius-chip: 10px;

  --shadow-float: 0 2px 6px rgba(11,31,20,.08), 0 10px 24px rgba(11,31,20,.12);
  --shadow-sheet: 0 -4px 20px rgba(11,31,20,.10), 0 -20px 60px rgba(11,31,20,.18);
  --shadow-pin: 0 2px 4px rgba(11,31,20,.25), 0 6px 14px rgba(11,31,20,.20);

  --ease-house: cubic-bezier(0.2, 0.8, 0.2, 1);
  --dur-ui: 180ms;
  --dur-sheet: 320ms;
  --dur-map: 480ms;
}

/* ========== Reset ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; height: 100dvh; background: var(--forest-ink); }
body { overflow: hidden; font-family: var(--font-ui); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; border: none; outline: none; background: transparent; }

/* ========== App Shell ========== */
#app { position: fixed; inset: 0; background: var(--forest-ink); }
#map { position: absolute; inset: 0; }

/* Status-bar mask (solid dark behind iOS status bar) + soft fade below */
#map-protect-top {
  position: absolute; top: 0; left: 0; right: 0; z-index: 2; pointer-events: none;
  height: calc(env(safe-area-inset-top) + 36px);
  background:
    linear-gradient(to bottom, var(--forest-ink) 0%, var(--forest-ink) env(safe-area-inset-top), rgba(11,31,20,.55) calc(env(safe-area-inset-top) + 4px), rgba(11,31,20,0) 100%);
}

/* ========== Floating UI ========== */
.glass-ink {
  background: color-mix(in srgb, var(--forest-ink) 78%, transparent);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
}
.glass-paper {
  background: color-mix(in srgb, var(--paper-raised) 94%, transparent);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

/* ========== Search Capsule ========== */
#search-capsule {
  position: absolute; top: calc(28px + env(safe-area-inset-top)); left: 16px; right: 16px; z-index: 8;
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px 13px 18px; border-radius: var(--radius-capsule);
  box-shadow: 0 2px 6px rgba(0,0,0,.1), 0 14px 30px rgba(11,31,20,.2);
}
#search-input {
  flex: 1; font-size: 16px; color: var(--forest-ink); letter-spacing: -0.005em;
}
#search-input::placeholder {
  font-family: var(--font-display); font-style: italic; color: var(--fog-40);
}
#search-clear {
  width: 24px; height: 24px; border-radius: 50%; background: rgba(11,31,20,.08); color: var(--forest-ink);
  display: none; align-items: center; justify-content: center;
}
#search-kbd {
  font-family: var(--font-mono); font-size: 10px; color: var(--fog-40);
  background: rgba(11,31,20,.06); padding: 3px 7px; border-radius: 6px;
}

/* ========== Search Suggestions ========== */
#search-suggestions {
  position: absolute; top: calc(86px + env(safe-area-inset-top)); left: 16px; right: 16px; z-index: 6;
  background: var(--paper-raised); border-radius: var(--radius-sheet); padding: 8px;
  box-shadow: 0 10px 30px rgba(11,31,20,.2); border: 1px solid rgba(11,31,20,.06);
  max-height: 60vh; overflow-y: auto; display: none;
}
.suggestion-row {
  width: 100%; text-align: left; padding: 10px 14px; border-radius: 18px;
  display: flex; align-items: center; gap: 12px; transition: background var(--dur-ui) var(--ease-house);
}
.suggestion-row:hover { background: rgba(11,31,20,.05); }

/* ========== Tool Rail ========== */
#tool-rail {
  position: absolute; left: 12px; top: calc(92px + env(safe-area-inset-top)); z-index: 6;
  display: flex; flex-direction: column; gap: 6px; padding: 6px; border-radius: var(--radius-capsule);
  box-shadow: 0 10px 30px rgba(11,31,20,.28);
}
.tool-btn {
  width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: var(--paper); transition: all var(--dur-ui) var(--ease-house);
}
.tool-btn.active { background: var(--lime-signal); color: var(--forest-ink); }

/* ========== Right-side controls ========== */
#zoom-rail {
  position: absolute; right: 16px; top: calc(156px + env(safe-area-inset-top)); z-index: 5;
  border-radius: 24px; padding: 4px; display: flex; flex-direction: column; gap: 2px;
  box-shadow: var(--shadow-float);
}
.zoom-btn {
  width: 40px; height: 40px; border-radius: 20px; color: var(--forest-ink);
  font-size: 22px; font-family: var(--font-ui); font-weight: 500;
  display: flex; align-items: center; justify-content: center;
}
#center-btn {
  position: absolute; right: 16px; bottom: calc(32px + env(safe-area-inset-bottom)); z-index: 5;
  width: 44px; height: 44px; border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,.1), 0 10px 24px rgba(11,31,20,.2);
  display: flex; align-items: center; justify-content: center; color: var(--forest-ink);
}

/* ========== Bottom Sheets ========== */
.bottom-sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 10;
  background: var(--paper-raised); border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
  padding: 10px 22px calc(20px + env(safe-area-inset-bottom));
  box-shadow: var(--shadow-sheet); max-height: 75vh; overflow-y: auto;
  animation: sheetUp var(--dur-sheet) var(--ease-house);
  display: none;
}
@keyframes sheetUp { from { transform: translateY(80%); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
/* sheet-handle removed — drag handles were decorative only and non-functional */
.eyebrow {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase; color: var(--fog-60);
}
.sheet-title {
  font-family: var(--font-display); font-weight: 600; font-size: 36px;
  letter-spacing: -0.03em; color: var(--forest-ink); line-height: 1;
  margin: 4px 0 6px; font-variation-settings: "opsz" 144;
}
.sheet-sub {
  font-family: var(--font-display); font-style: italic; font-size: 15px;
  color: var(--fog-60); margin-bottom: 16px;
}

/* ========== Mode Banner ========== */
#mode-banner {
  position: absolute; left: 68px; right: 16px; top: calc(92px + env(safe-area-inset-top)); z-index: 5;
  border-radius: var(--radius-card); padding: 14px 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 10px 24px rgba(11,31,20,.14);
  display: none; align-items: center; gap: 12px;
}
#mode-banner .close-btn {
  width: 30px; height: 30px; border-radius: 50%; background: rgba(11,31,20,.08);
  color: var(--forest-ink); display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
}

/* ========== Buttons ========== */
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius-button);
  background: var(--forest-ink); color: var(--lime-signal);
  font-family: var(--font-ui); font-weight: 600; font-size: 15px; letter-spacing: -0.005em;
  transition: transform var(--dur-ui) var(--ease-house);
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  padding: 14px 18px; border-radius: var(--radius-button);
  background: rgba(11,31,20,.08); color: var(--forest-ink);
  font-family: var(--font-ui); font-weight: 600; font-size: 15px;
}

/* ========== Travel Mode Switcher ========== */
.mode-switcher {
  display: flex; gap: 6px; margin-bottom: 14px; background: var(--paper-sunken); padding: 4px; border-radius: var(--radius-button);
}
.mode-switcher button {
  flex: 1; padding: 10px 8px; border-radius: 10px; text-align: center;
  font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: .02em;
  color: var(--forest-ink); transition: all var(--dur-ui) var(--ease-house);
}
.mode-switcher button.active { background: var(--forest-ink); color: var(--lime-signal); }
.mode-switcher .mode-dur {
  font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.02em;
  font-variation-settings: "opsz" 36; display: block;
}
.mode-switcher .mode-label {
  text-transform: uppercase; letter-spacing: .12em; font-size: 9px; opacity: .8; display: block;
}

/* ========== Toggle ========== */
.toggle {
  width: 46px; height: 28px; border-radius: var(--radius-capsule); position: relative;
  background: #D2CCB9; transition: background var(--dur-ui) var(--ease-house); flex: 0 0 auto;
}
.toggle.on { background: var(--forest-ink); }
.toggle .knob {
  position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%;
  background: var(--paper-raised); box-shadow: 0 2px 4px rgba(11,31,20,.2);
  transition: left var(--dur-ui) var(--ease-house);
}
.toggle.on .knob { left: 21px; background: var(--lime-signal); }

/* ========== Endpoint Card ========== */
.endpoint-card {
  background: var(--paper); border-radius: var(--radius-card); padding: 14px 16px; margin-bottom: 12px;
}
.endpoint-row { display: flex; align-items: center; gap: 12px; }
.endpoint-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--forest-ink); flex: 0 0 auto; }
.endpoint-label { font-family: var(--font-ui); font-size: 9px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--fog-60); }
.endpoint-value {
  font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: -0.02em;
  color: var(--forest-ink); line-height: 1.1; font-variation-settings: "opsz" 36;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.endpoint-divider { border-top: 1px dashed rgba(11,31,20,.15); margin: 10px -4px 10px 22px; }

/* ========== Step list ========== */
.step-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(11,31,20,.08); }
.step-row:last-child { border-bottom: none; }
.step-num {
  flex: 0 0 auto; width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  background: rgba(11,31,20,.06); color: var(--forest-ink);
}
.step-num.first { background: var(--lime-signal); }
.step-text {
  font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -0.015em;
  color: var(--forest-ink); line-height: 1.2; font-variation-settings: "opsz" 36;
}
.step-dist { font-family: var(--font-mono); font-size: 11px; color: var(--fog-60); margin-top: 2px; }

/* ========== Severity badges ========== */
.sev-badge {
  flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-ui); font-size: 20px; font-weight: 800;
}
.sev-major { background: #C73A2D; border: 2px solid #7A1F16; color: #7A1F16; }
.sev-moderate { background: #E09128; border: 2px solid #7A4D10; color: #7A4D10; }
.sev-minor { background: var(--lime-signal); border: 2px solid var(--forest-ink); color: var(--forest-ink); }

/* ========== Incident row ========== */
.incident-row { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(11,31,20,.08); }
.incident-row:last-child { border-bottom: none; }
.incident-type { font-family: var(--font-ui); font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
.incident-type.major { color: #C73A2D; }
.incident-type.moderate { color: #E09128; }
.incident-type.minor { color: var(--forest-ink); }

/* ========== Isochrone time pills ========== */
.time-pills { display: flex; gap: 8px; margin-bottom: 14px; }
.time-pill {
  flex: 1; padding: 12px; border-radius: var(--radius-button); border: 2px solid transparent;
  background: var(--paper); font-family: var(--font-display); font-weight: 600; font-size: 22px;
  letter-spacing: -0.02em; color: var(--forest-ink); font-variation-settings: "opsz" 36;
  text-align: center; transition: all var(--dur-ui) var(--ease-house);
}
.time-pill.active { border-color: var(--forest-ink); background: var(--lime-signal); }
.time-pill .unit {
  font-family: var(--font-ui); font-size: 11px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; opacity: .7;
}

/* ========== Vibe grid ========== */
.vibe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.vibe-card {
  padding: 10px 12px; border-radius: var(--radius-button); border: 2px solid transparent;
  display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
  transition: all var(--dur-ui) var(--ease-house);
}
.vibe-card.active { border-color: var(--forest-ink); box-shadow: 0 4px 12px rgba(11,31,20,.2); }
.vibe-dot { width: 14px; height: 14px; border-radius: 50%; }
.vibe-name { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -0.02em; line-height: 1; font-variation-settings: "opsz" 36; }

/* ========== Toggle row ========== */
.toggle-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(11,31,20,.08);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-row-label { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -0.015em; color: var(--forest-ink); font-variation-settings: "opsz" 36; }
.toggle-row-sub { font-family: var(--font-ui); font-size: 12px; color: var(--fog-60); margin-top: 1px; }

/* ========== API Key Prompt ========== */
#api-key-overlay {
  position: fixed; inset: 0; z-index: 30;
  background: var(--forest-ink);
  display: flex; align-items: flex-end; justify-content: center;
}
#api-key-sheet {
  width: 100%; background: var(--paper-raised);
  border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
  padding: 24px 22px calc(28px + env(safe-area-inset-bottom));
  box-shadow: 0 -20px 60px rgba(11,31,20,.28);
}
#api-key-input {
  flex: 1; font-family: var(--font-mono); font-size: 16px; color: var(--forest-ink);
}

/* ========== Place Sheet ========== */
#place-sheet .pick-chip {
  display: inline-block; background: var(--lime-signal); color: var(--forest-ink);
  font-family: var(--font-ui); font-size: 10px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; padding: 4px 10px; border-radius: var(--radius-capsule); margin-bottom: 8px;
}
#place-sheet .place-name {
  font-family: var(--font-display); font-weight: 600; font-size: 40px; letter-spacing: -0.03em;
  line-height: 1; color: var(--forest-ink); margin: 4px 0 10px; font-variation-settings: "opsz" 144;
}
#place-sheet .place-desc {
  font-family: var(--font-display); font-size: 16px; line-height: 1.5; color: var(--fog-80); margin-bottom: 14px;
}
#place-sheet .place-meta {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  font-family: var(--font-ui); font-size: 12.5px; font-weight: 500; color: var(--fog-60); margin-bottom: 18px;
}
.meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--fog-40); }

/* ========== User location pulse ========== */
@keyframes vmPulse { 0% { transform: scale(.7); opacity: .9; } 100% { transform: scale(1.6); opacity: 0; } }
.mapboxgl-user-location-dot { /* default Mapbox style is fine */ }

/* ========== Landscape lock ========== */
#rotate-prompt {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: var(--forest-ink); color: var(--paper);
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  font-family: var(--font-display); font-size: 24px; font-weight: 600;
}
@media screen and (orientation: landscape) {
  #rotate-prompt { display: flex !important; }
}

/* ========== Hide "/" shortcut hint on touch devices ========== */
@media (hover: none), (pointer: coarse) {
  #search-kbd { display: none !important; }
}

/* ========== Search Cancel Button ========== */
#search-cancel {
  display: none; font-family: var(--font-ui); font-size: 14px; font-weight: 600;
  color: var(--forest-ink); padding: 8px 12px; white-space: nowrap;
}

/* ========== Search Capsule Committed State ========== */
#search-capsule.committed {
  background: color-mix(in srgb, var(--forest-ink) 92%, transparent);
}
#search-capsule.committed #search-input {
  color: var(--paper); font-family: var(--font-ui); font-style: normal;
}
#search-capsule.committed #search-clear { display: flex !important; background: rgba(255,255,255,.15); }
#search-capsule.committed #search-clear svg { stroke: var(--paper); }
#search-capsule.committed svg { stroke: var(--paper); opacity: .6; }

/* ========== Category Chips ========== */
.category-chips {
  display: flex; gap: 8px; padding: 12px 14px 4px; overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.category-chips::-webkit-scrollbar { display: none; }
.category-chip {
  flex: 0 0 auto; padding: 8px 14px; border-radius: var(--radius-capsule);
  background: var(--paper); border: 1px solid rgba(11,31,20,.1);
  font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: var(--forest-ink);
  white-space: nowrap; transition: all var(--dur-ui) var(--ease-house);
}
.category-chip:active { background: var(--lime-signal); border-color: var(--forest-ink); }

/* ========== Recents Row ========== */
.recent-row {
  width: 100%; text-align: left; padding: 10px 14px; border-radius: 14px;
  display: flex; align-items: center; gap: 12px; transition: background var(--dur-ui) var(--ease-house);
}
.recent-row:hover { background: rgba(11,31,20,.05); }

/* ========== Bottom Sheet Heights ========== */
.bottom-sheet.peek {
  max-height: 180px; overflow: hidden;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
}
.bottom-sheet.half { max-height: 50vh; }
.bottom-sheet.expanded { max-height: 90vh; }

/* ========== Sheet Close Button ========== */
.sheet-close {
  position: absolute; top: 12px; right: 16px; width: 32px; height: 32px; border-radius: 50%;
  background: rgba(11,31,20,.08); color: var(--forest-ink);
  display: flex; align-items: center; justify-content: center; z-index: 1;
}

/* ========== Category List Results ========== */
.result-list-row {
  width: 100%; text-align: left; padding: 12px 14px; border-radius: 14px;
  display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(11,31,20,.06);
  transition: background var(--dur-ui) var(--ease-house);
}
.result-list-row:hover { background: rgba(11,31,20,.04); }
.result-list-row:last-child { border-bottom: none; }

/* ========== Long-press indicator ========== */
@keyframes longPressRing { from { transform: scale(0.5); opacity: 1; } to { transform: scale(1.8); opacity: 0; } }
.long-press-ring {
  width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--lime-signal);
  animation: longPressRing 600ms var(--ease-house) forwards; pointer-events: none;
}

/* ========== Mapbox overrides ========== */
.mapboxgl-ctrl-top-left, .mapboxgl-ctrl-top-right,
.mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
.mapboxgl-ctrl, .mapboxgl-ctrl-group { display: none !important; }
.mapboxgl-user-location-accuracy-circle,
.mapboxgl-user-location-heading,
.mapboxgl-user-location-dot-stale { display: none !important; }
.mapboxgl-popup-content {
  font-family: var(--font-ui); font-size: 13px; border-radius: 12px; padding: 10px 14px;
  box-shadow: var(--shadow-float);
}
</style>
</head>
<body>

<div id="app">
  <div id="map"></div>
  <div id="map-protect-top"></div>

  <!-- Wordmark + build number (tap to force SW update) -->

      <div style="font-family:var(--font-display);font-style:italic;font-size:16px;color:var(--fog-60);margin-bottom:6px">Stored locally in your browser. Only sent to Mapbox&rsquo;s APIs&mdash;never to a third-party server.</div>
      <div style="font-family:var(--font-ui);font-size:12px;color:var(--fog-40);margin-bottom:16px;line-height:1.4">Your <strong>default public token</strong> (<span style="font-family:var(--font-mono);font-size:11px">pk.*</span>) works&mdash;no special scopes needed.</div>
      <div style="display:flex;gap:8px;align-items:center;background:var(--paper);border-radius:var(--radius-button);padding:12px 14px;margin-bottom:14px;border:1px solid rgba(11,31,20,.08)">
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--fog-40)">pk.</div>
        <input id="api-key-input" type="text" placeholder="eyJ1Ijoi..." onkeydown="if(event.key==='Enter')saveApiKey()" />

      <button class="btn-primary" onclick="saveApiKey()">Save &amp; Continue</button>
      <div style="text-align:center;margin-top:8px">

    Rotate to portrait
  </div>
</div>

<script>
// ========== Build & SW Update ==========
const BUILD = '5';
document.getElementById('build-num').textContent = 'b' + BUILD;

let pendingUpdateSW = null;
function showUpdateDot(sw) {
  pendingUpdateSW = sw;
  document.getElementById('update-dot').style.display = 'inline';
}

function forceUpdate() {
  if (pendingUpdateSW) {
    pendingUpdateSW.postMessage('SKIP_WAITING');
  } else if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(r => r.update());
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
    if (reg.waiting) showUpdateDot(reg.waiting);
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if (sw.state === 'installed' && navigator.serviceWorker.controller) showUpdateDot(sw);
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}

// ========== Token Manager ==========
const TokenManager = {
  _key: 'vibemaps_map_token',
  get() { return localStorage.getItem(this._key); },
  set(t) { localStorage.setItem(this._key, t); },
  clear() { localStorage.removeItem(this._key); },
  async validate(token) {
    try {
      const r = await fetch(`https://api.mapbox.com/styles/v1/mapbox/standard?access_token=${encodeURIComponent(token)}`);
      return r.ok;
    } catch { return false; }
  },
  mask(t) { return !t || t.length < 15 ? '........' : t.slice(0, 10) + '........' + t.slice(-4); },
};

// ========== AppState (central state model per FLOWS.md) ==========
const AppState = {
  mode: 'idle',  // idle | search | place | directions | isochrone | incidents | layers
  focus: null,   // { kind: 'place'|'route'|'isochrone'|'incident', data: {}, renderedLayers: [] }
  sheet: { visible: false, height: 'peek' },
  lastQuery: '',
  recents: JSON.parse(sessionStorage.getItem('vibemaps_recents') || '[]'),
  searchSessionToken: crypto.randomUUID(),
  committed: null,  // { name, query } — when search capsule shows a committed result
};

function saveRecents() {
  sessionStorage.setItem('vibemaps_recents', JSON.stringify(AppState.recents.slice(0, 20)));
}

function addRecent(place) {
  // Deduplicate by name
  AppState.recents = AppState.recents.filter(r => r.name !== place.name);
  AppState.recents.unshift({ name: place.name, address: place.address, coordinates: place.coordinates, mapbox_id: place.mapbox_id });
  saveRecents();
}

// ========== Legacy State (preserved for directions/isochrone/incidents) ==========
let map;
let selectedPlace = null;
let userPosition = null;
let directionsState = { from: null, to: null, profile: 'driving-traffic', geometry: null, steps: [], duration: 0, distance: 0 };
let isoState = { pin: null, profile: 'walking', minutes: 15, showAll: false };
let incidents = [];
let currentVibe = localStorage.getItem('vibemaps_vibe') || 'day';
let show3D = localStorage.getItem('vibemaps_3d') !== 'false';
let showTerrain = localStorage.getItem('vibemaps_terrain') !== 'false';
let showTraffic = localStorage.getItem('vibemaps_traffic') !== 'false';
let searchDebounce = null;
let geoControl;
let longPressTimer = null;
let longPressCoord = null;

// Category chips configuration
const CATEGORIES = [
  { label: 'Coffee', query: 'coffee', icon: 'pin' },
  { label: 'Food', query: 'restaurant', icon: 'pin' },
  { label: 'Bars', query: 'bar', icon: 'pin' },
  { label: 'Transit', query: 'transit station', icon: 'pin' },
  { label: 'Parks', query: 'park', icon: 'pin' },
  { label: 'Fuel', query: 'fuel station', icon: 'pin' },
  { label: 'Shops', query: 'shop', icon: 'pin' },
];

// ========== SVG Icons ==========
function icon(name, size = 18, sw = 1.5) {
  const icons = {
    search: '<circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>',
    pin: '<path d="M12 21s-7-6.5-7-12a7 7 0 1114 0c0 5.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/>',
    compass: '<circle cx="12" cy="12" r="9"/><polygon points="15.5 8.5 10.5 10.5 8.5 15.5 13.5 13.5"/>',
    map: '<polygon points="4 6 9 4 15 6 20 4 20 18 15 20 9 18 4 20"/><line x1="9" y1="4" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="20"/>',
    clock: '<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
    walk: '<polygon points="3 17 9 11 13 15 21 7"/><polyline points="15 7 21 7 21 13"/>',
    list: '<line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>',
    star: '<polygon points="12 3 14.5 9.5 21 10 16 14.5 17.5 21 12 17.5 6.5 21 8 14.5 3 10 9.5 9.5"/>',
    close: '<line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>',
    crosshair: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="3" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="21" y2="12"/>',
    bookmark: '<path d="M19 21 12 17l-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/>',
    layers: '<polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
    history: '<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/><path d="M3 12a9 9 0 0118 0"/>',
    back: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${icons[name] || ''}</svg>`;
}

// ========== Tool Rail ==========
const tools = [
  { id: 'idle', label: 'Map', icon: 'map' },
  { id: 'directions', label: 'Directions', icon: 'compass' },
  { id: 'isochrone', label: 'Isochrone', icon: 'clock' },
  { id: 'incidents', label: 'Incidents', icon: 'star' },
  { id: 'layers', label: 'Layers', icon: 'layers' },
];

function renderToolRail() {
  const rail = document.getElementById('tool-rail');
  rail.innerHTML = tools.map(t =>
    `<button class="tool-btn ${AppState.mode === t.id ? 'active' : ''}" title="${t.label}" onclick="goTo('${t.id}')">${icon(t.icon, 18, AppState.mode === t.id ? 2 : 1.6)}</button>`
  ).join('');
}

// ========== goTo — Central Mode Transition (FLOWS.md) ==========
function goTo(mode, payload) {
  const prev = AppState.mode;

  // Tear down previous mode's UI
  document.querySelectorAll('.bottom-sheet').forEach(s => s.style.display = 'none');
  document.getElementById('search-suggestions').style.display = 'none';
  document.getElementById('mode-banner').style.display = 'none';

  // Clear category markers when leaving search/category results
  if (prev === 'search' || prev === 'place') {
    if (mode !== 'place' && mode !== 'search') {
      clearCategoryMarkers();
    }
  }

  AppState.mode = mode;
  AppState.sheet.visible = false;
  renderToolRail();

  // Show/hide controls
  const idleModes = ['idle', 'layers', 'place'];
  document.getElementById('zoom-rail').style.display = idleModes.includes(mode) ? 'flex' : 'none';
  document.getElementById('center-btn').style.display = idleModes.includes(mode) ? 'flex' : 'none';
  document.getElementById('tool-rail').style.display = mode === 'search' ? 'none' : 'flex';

  // Search capsule state
  const capsule = document.getElementById('search-capsule');
  const cancelBtn = document.getElementById('search-cancel');
  const kbdEl = document.getElementById('search-kbd');
  if (mode === 'search') {
    cancelBtn.style.display = 'block';
    kbdEl.style.display = 'none';
    capsule.classList.remove('committed');
  } else {
    cancelBtn.style.display = 'none';
    if (!AppState.committed) {
      kbdEl.style.display = 'block';
    }
  }

  // Mode-specific setup
  if (mode === 'idle') {
    if (selectedPlace && prev === 'place') {
      // Keep place sheet visible if coming from place mode
    }
  } else if (mode === 'search') {
    document.getElementById('search-input').focus();
    showRecentsPanel();
  } else if (mode === 'place') {
    showPlaceSheet(payload);
  } else if (mode === 'directions') {
    if (payload?.to) {
      directionsState.to = payload.to;
      directionsState.from = payload.from || (userPosition
        ? { name: 'Current location', coords: [userPosition.lng, userPosition.lat] }
        : { name: 'Map center', coords: [map.getCenter().lng, map.getCenter().lat] });
    }
    showDirectionsSheet();
  } else if (mode === 'isochrone') {
    if (payload?.center) {
      isoState.pin = payload.center;
    } else if (!isoState.pin) {
      isoState.pin = userPosition ? [userPosition.lng, userPosition.lat] : [map.getCenter().lng, map.getCenter().lat];
    }
    showIsochroneSheet();
    addIsochronePin();
    fetchIsochrone();
    showModeBanner('Isochrone', "What's within reach?", 'Drop a pin. Pick a travel time.');
  } else if (mode === 'incidents') {
    if (directionsState.geometry && directionsState.profile === 'driving-traffic') {
      showIncidentsSheet();
    } else {
      showModeBanner('Incidents', 'Traffic along the route', 'Shown while driving is active.');
    }
  } else if (mode === 'layers') {
    showLayersSheet();
  }
}

// Legacy compat
function setMode(mode) { goTo(mode); }

function showModeBanner(eyebrow, title, sub) {
  const el = document.getElementById('mode-banner');
  el.innerHTML = `
    <div style="flex:1;min-width:0">
      <div class="eyebrow" style="font-size:10px">${eyebrow}</div>
      <div style="font-family:var(--font-display);font-weight:600;font-size:20px;letter-spacing:-0.02em;color:var(--forest-ink);line-height:1.05;font-variation-settings:'opsz' 36">${title}</div>
      <div style="font-family:var(--font-display);font-style:italic;font-size:12px;color:var(--fog-60);margin-top:2px">${sub}</div>
    </div>
    <button class="close-btn" onclick="goTo('idle')">${icon('close', 14)}</button>
  `;
  el.style.display = 'flex';
}

// ========== API Key ==========
function saveApiKey() {
  const input = document.getElementById('api-key-input');
  let token = input.value.trim();
  if (!token.startsWith('pk.')) token = 'pk.' + token;

  TokenManager.validate(token).then(valid => {
    if (valid) {
      TokenManager.set(token);
      document.getElementById('api-key-overlay').style.display = 'none';
      initMap(token);
    } else {
      input.style.border = '2px solid #C73A2D';
      input.placeholder = 'Invalid token - try again';
    }
  });
}

function checkToken() {
  const token = TokenManager.get();
  if (token) {
    document.getElementById('api-key-overlay').style.display = 'none';
    initMap(token);
  }
}

// ========== Map Init ==========
function initMap(token) {
  mapboxgl.accessToken = token;

  const savedPos = JSON.parse(localStorage.getItem('vibemaps_position') || 'null');
  const center = savedPos ? [savedPos.lng, savedPos.lat] : [-0.1276, 51.5074];
  const zoom = savedPos ? savedPos.zoom : 13;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/standard',
    center: center,
    zoom: zoom,
    pitch: 45,
    bearing: -10,
    antialias: true,
    projection: 'globe',
  });

  // Geolocation control (hidden, used programmatically)
  geoControl = new mapboxgl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: false,
  });
  map.addControl(geoControl);

  // Keep canvas sized to viewport (dvh changes, rotation, iOS chrome hide/show)
  const resizeMap = () => map && map.resize();
  window.addEventListener('resize', resizeMap);
  window.addEventListener('orientationchange', resizeMap);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeMap);

  map.on('load', () => {
    applyVibe(currentVibe);

    if (show3D) map.setConfigProperty('basemap', 'show3dObjects', true);
    if (showTerrain) map.setConfigProperty('basemap', 'showTerrain', true);

    // Add route layers ABOVE road labels so they render visibly (FLOWS.md fix for OPEN issue)
    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({
      id: 'route-line-casing', type: 'line', source: 'route',
      paint: { 'line-color': 'rgba(11,31,20,.4)', 'line-width': 8, 'line-blur': 0 },
      layout: { 'line-cap': 'round', 'line-join': 'round' },
    }, 'road-label');
    map.addLayer({
      id: 'route-line', type: 'line', source: 'route',
      paint: { 'line-color': '#C8FF4C', 'line-width': 5 },
      layout: { 'line-cap': 'round', 'line-join': 'round' },
    }, 'road-label');

    // Isochrone layers
    map.addSource('isochrone', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({
      id: 'isochrone-fill', type: 'fill', source: 'isochrone',
      paint: { 'fill-color': ['get', 'fill'], 'fill-opacity': ['get', 'opacity'] },
    });
    map.addLayer({
      id: 'isochrone-line', type: 'line', source: 'isochrone',
      paint: { 'line-color': ['get', 'stroke'], 'line-width': 1.5, 'line-dasharray': [2, 2], 'line-blur': 0.5 },
    });

    // Category search result pins source
    map.addSource('category-pins', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({
      id: 'category-pins-circle', type: 'circle', source: 'category-pins',
      paint: {
        'circle-radius': 7, 'circle-color': '#C8FF4C',
        'circle-stroke-width': 2, 'circle-stroke-color': '#0B1F14',
      },
    });

    // Trigger geolocation
    geoControl.trigger();

    // Map interactions
    map.on('click', onMapClick);

    // Long-press detection for touch
    setupLongPress();
  });

  geoControl.on('geolocate', (e) => {
    userPosition = { lng: e.coords.longitude, lat: e.coords.latitude };
    localStorage.setItem('vibemaps_position', JSON.stringify({ lng: userPosition.lng, lat: userPosition.lat, zoom: map.getZoom() }));
  });

  map.on('moveend', () => {
    const c = map.getCenter();
    localStorage.setItem('vibemaps_position', JSON.stringify({ lng: c.lng, lat: c.lat, zoom: map.getZoom() }));
  });

  renderToolRail();
}

// ========== Long-press (Flow 1) ==========
function setupLongPress() {
  const canvas = map.getCanvas();

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    longPressCoord = { x: touch.clientX, y: touch.clientY };
    longPressTimer = setTimeout(() => {
      // Convert to map coordinates
      const point = map.unproject([longPressCoord.x - canvas.getBoundingClientRect().left, longPressCoord.y - canvas.getBoundingClientRect().top]);
      handleLongPress(point);
    }, 500);
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    if (!longPressTimer) return;
    const touch = e.touches[0];
    const dx = touch.clientX - longPressCoord.x;
    const dy = touch.clientY - longPressCoord.y;
    if (Math.sqrt(dx * dx + dy * dy) > 10) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
  }, { passive: true });

  canvas.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }, { passive: true });

  canvas.addEventListener('touchcancel', () => {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }, { passive: true });
}

function handleLongPress(lngLat) {
  if (AppState.mode !== 'idle' && AppState.mode !== 'place') return;
  // Force a pin drop + reverse geocode regardless of POI
  reverseGeocodeAndShow(lngLat.lng, lngLat.lat);
}

// ========== Vibe System ==========
const VIBES = {
  day: { lightPreset: 'day', color: '#D6E4CF', accent: '#C8FF4C', fg: '#0B1F14' },
  warm: { lightPreset: 'day', color: '#F0E8D4', accent: '#FFB547', fg: '#2E2C26' },
  dusk: { lightPreset: 'dusk', color: '#2A2340', accent: '#FFB547', fg: '#F2EFE6' },
  trailhead: { lightPreset: 'day', color: '#C9D2B9', accent: '#C84B2E', fg: '#2B3321' },
  aviator: { lightPreset: 'day', color: '#F3E4C8', accent: '#E85A2C', fg: '#3A2A1C' },
};

function applyVibe(vibeId) {
  currentVibe = vibeId;
  localStorage.setItem('vibemaps_vibe', vibeId);
  const v = VIBES[vibeId];
  if (!map) return;
  try { map.setConfigProperty('basemap', 'lightPreset', v.lightPreset); } catch (e) {}
  if (map.getLayer('route-line')) {
    map.setPaintProperty('route-line', 'line-color', v.accent);
  }
}

// ========== Search (Flow 2) ==========
function setupSearch() {
  const input = document.getElementById('search-input');
  const clear = document.getElementById('search-clear');
  const kbd = document.getElementById('search-kbd');

  input.addEventListener('input', () => {
    const q = input.value;
    clear.style.display = q ? 'flex' : 'none';
    if (AppState.mode !== 'search') kbd.style.display = q ? 'none' : 'block';
    input.style.fontFamily = q ? 'var(--font-ui)' : 'var(--font-display)';
    input.style.fontStyle = q ? 'normal' : 'italic';

    clearTimeout(searchDebounce);
    if (q.length >= 2) {
      searchDebounce = setTimeout(() => fetchSearchResults(q), 150);
    } else if (q.length === 0) {
      showRecentsPanel();
    }
  });

  input.addEventListener('focus', () => {
    if (AppState.mode !== 'search') goTo('search');
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const firstRow = document.querySelector('#search-suggestions .suggestion-row');
      if (firstRow) firstRow.click();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      goTo('search');
    }
    if (e.key === 'Escape') {
      if (AppState.mode === 'search') cancelSearch();
      input.blur();
    }
  });
}

// Cancel search — exits mode, restores tool rail
function cancelSearch() {
  const input = document.getElementById('search-input');

  input.style.fontFamily = 'var(--font-display)';
  input.style.fontStyle = 'italic';

// Clear committed search result
function clearSearch() {

// Category search (Flow 2 — multi-result)
async function searchCategory(query) {
  const token = TokenManager.get();
  if (!token) return;

  const input = document.getElementById('search-input');
  input.value = query;
  input.style.fontFamily = 'var(--font-ui)';
  input.style.fontStyle = 'normal';

  const center = map.getCenter();
  const bounds = map.getBounds();
  const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;

  try {
    const resp = await fetch(
      `https://api.mapbox.com/search/searchbox/v1/suggest?q=${encodeURIComponent(query)}&language=en&limit=10&proximity=${center.lng},${center.lat}&bbox=${bbox}&session_token=${AppState.searchSessionToken}&access_token=${encodeURIComponent(token)}`
    );
    const data = await resp.json();
    const suggestions = data.suggestions || [];

    if (suggestions.length === 0) {
      renderSearchResults([]);
      return;
    }

    // Retrieve all results for category display
    const results = await Promise.all(
      suggestions.slice(0, 10).map(async (s) => {
        try {
          const r = await fetch(`https://api.mapbox.com/search/searchbox/v1/retrieve/${encodeURIComponent(s.mapbox_id)}?session_token=${AppState.searchSessionToken}&access_token=${encodeURIComponent(token)}`);
          const d = await r.json();
          const f = d.features?.[0];
          if (!f) return null;
          return {
            name: f.properties?.name || s.name,
            address: f.properties?.full_address || f.properties?.place_formatted || s.full_address || '',
            category: f.properties?.poi_category_ids?.[0] || '',
            coordinates: f.geometry.coordinates,
            mapbox_id: s.mapbox_id,
            properties: f.properties || {},
          };
        } catch { return null; }
      })
    );

    const validResults = results.filter(Boolean);
    if (validResults.length > 0) {
      showCategoryResults(validResults, query);
    }
  } catch (e) {
    console.error('Category search error:', e);
  }
}

function showCategoryResults(results, query) {
  // Commit the search capsule
  commitSearch(query);

  // Drop pins on map
  const features = results.map(r => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: r.coordinates },
    properties: { name: r.name },
  }));
  if (map.getSource('category-pins')) {
    map.getSource('category-pins').setData({ type: 'FeatureCollection', features });
  }

  // Fit bounds to results
  if (results.length > 1) {
    const bounds = results.reduce((b, r) => b.extend(r.coordinates), new mapboxgl.LngLatBounds(results[0].coordinates, results[0].coordinates));
    map.fitBounds(bounds, { padding: { top: 100, bottom: 280, left: 60, right: 60 }, duration: 480 });
  }

  // Show list in suggestions panel as a bottom sheet
  const el = document.getElementById('search-suggestions');
  el.innerHTML = `
    <div style="padding:10px 14px 6px" class="eyebrow">${results.length} results for "${query}"</div>
    ${results.map((r, i) => `
      <button class="result-list-row" onclick='selectCategoryResult(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
        <div style="width:28px;height:28px;border-radius:50%;background:var(--lime-signal);color:var(--forest-ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-family:var(--font-mono);font-size:11px;font-weight:600">${i + 1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--font-display);font-weight:600;font-size:16px;letter-spacing:-0.015em;color:var(--forest-ink);line-height:1.1;font-variation-settings:'opsz' 36">${r.name}</div>
          <div style="font-family:var(--font-ui);font-size:11px;color:var(--fog-60);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.address}</div>
        </div>
      </button>
    `).join('')}
  `;
  el.style.display = 'block';
  goTo('idle');
  // Keep suggestions visible as a results list
  el.style.display = 'block';
}

function selectCategoryResult(result) {
  selectedPlace = result;
  addRecent(result);
  clearCategoryMarkers();
  dropPlacePin(result.coordinates);
  map.flyTo({ center: result.coordinates, zoom: 16, duration: 480, padding: { bottom: 200 } });
  document.getElementById('search-suggestions').style.display = 'none';
  goTo('place');
}

function clearCategoryMarkers() {
  if (map && map.getSource('category-pins')) {
    map.getSource('category-pins').setData({ type: 'FeatureCollection', features: [] });
  }
}

// Commit search — collapse capsule to show result name
function commitSearch(name) {
  AppState.committed = { name };
  const input = document.getElementById('search-input');
  const capsule = document.getElementById('search-capsule');
  input.value = name;
  input.style.fontFamily = 'var(--font-ui)';
  input.style.fontStyle = 'normal';
  capsule.classList.add('committed');
  document.getElementById('search-clear').style.display = 'flex';
  document.getElementById('search-kbd').style.display = 'none';
  document.getElementById('search-cancel').style.display = 'none';
}

async function fetchSearchResults(query) {
  const token = TokenManager.get();
  if (!token) return;

  const center = map.getCenter();
  const proximity = userPosition ? `${userPosition.lng},${userPosition.lat}` : `${center.lng},${center.lat}`;
  const bounds = map.getBounds();
  const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;

  try {
    const resp = await fetch(
      `https://api.mapbox.com/search/searchbox/v1/suggest?q=${encodeURIComponent(query)}&language=en&limit=8&proximity=${proximity}&bbox=${bbox}&session_token=${AppState.searchSessionToken}&country=gb&access_token=${encodeURIComponent(token)}`
    );
    const data = await resp.json();
    AppState.lastQuery = query;
    renderSearchResults(data.suggestions || []);
  } catch (e) {
    console.error('Search error:', e);
  }
}

function renderSearchResults(results) {
  const el = document.getElementById('search-suggestions');
  if (!results.length) {
    el.innerHTML = `
      <div style="padding:10px 14px 6px" class="eyebrow">0 matches</div>
      <div style="font-family:var(--font-display);font-style:italic;font-size:15px;color:var(--fog-40);padding:12px 14px 16px">No places by that name nearby.</div>
    `;
    el.style.display = 'block';
    return;
  }

  el.innerHTML = `
    <div style="padding:10px 14px 6px" class="eyebrow">${results.length} suggestions</div>
    ${results.map((r) => `
      <button class="suggestion-row" onclick='selectSuggestion(${JSON.stringify(r.mapbox_id)})'>
        <div style="width:32px;height:32px;border-radius:50%;background:var(--forest-ink);color:var(--lime-signal);display:flex;align-items:center;justify-content:center;flex:0 0 auto">
          ${icon('pin', 14)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:-0.015em;color:var(--forest-ink);line-height:1.1;font-variation-settings:'opsz' 36">${r.name || ''}</div>
          <div style="font-family:var(--font-ui);font-size:12px;color:var(--fog-60);margin-top:2px">${r.full_address || r.place_formatted || ''}</div>
        </div>
      </button>
    `).join('')}
  `;
  el.style.display = 'block';
}

async function selectSuggestion(mapboxId) {
  const token = TokenManager.get();
  try {
    const resp = await fetch(
      `https://api.mapbox.com/search/searchbox/v1/retrieve/${encodeURIComponent(mapboxId)}?session_token=${AppState.searchSessionToken}&access_token=${encodeURIComponent(token)}`
    );
    const data = await resp.json();
    const feature = data.features?.[0];
    if (!feature) return;

    // Rotate session token after successful retrieve (per Search Box billing best practice)
    AppState.searchSessionToken = crypto.randomUUID();

    selectedPlace = {
      name: feature.properties?.name || 'Unknown',
      address: feature.properties?.full_address || feature.properties?.place_formatted || '',
      category: feature.properties?.poi_category_ids?.[0] || feature.properties?.feature_type || '',
      coordinates: feature.geometry.coordinates,
      mapbox_id: mapboxId,
      properties: feature.properties,
    };

    addRecent(selectedPlace);
    commitSearch(selectedPlace.name);

    // Fly to with padding for sheet
    map.flyTo({ center: feature.geometry.coordinates, zoom: Math.max(map.getZoom(), 15), duration: 480, padding: { bottom: 200 } });

    clearMarkers();
    dropPlacePin(feature.geometry.coordinates);
    goTo('place');
  } catch (e) {
    console.error('Retrieve error:', e);
  }
}

function dropPlacePin(coords) {
  clearMarkers();
  const markerEl = document.createElement('div');
  markerEl.innerHTML = `<div style="background:var(--lime-signal);color:var(--forest-ink);padding:6px 14px;border-radius:9999px;font-family:var(--font-display);font-weight:600;font-size:15px;letter-spacing:-0.02em;box-shadow:var(--shadow-pin);white-space:nowrap;font-variation-settings:'opsz' 36;max-width:200px;overflow:hidden;text-overflow:ellipsis">${selectedPlace?.name || 'Pin'}</div><div style="width:9px;height:9px;border-radius:50%;background:var(--lime-signal);margin:5px auto 0;border:2px solid var(--forest-ink);box-shadow:0 0 0 4px rgba(200,255,76,.4)"></div>`;
  markerEl.style.textAlign = 'center';
  window._placeMarker = new mapboxgl.Marker({ element: markerEl, anchor: 'bottom' })
    .setLngLat(coords)
    .addTo(map);
}

function clearMarkers() {
  if (window._placeMarker) { window._placeMarker.remove(); window._placeMarker = null; }
  if (window._isoMarker) { window._isoMarker.remove(); window._isoMarker = null; }
  if (window._startMarker) { window._startMarker.remove(); window._startMarker = null; }
  if (window._endMarker) { window._endMarker.remove(); window._endMarker = null; }
  if (window._incidentMarkers) { window._incidentMarkers.forEach(m => m.remove()); window._incidentMarkers = []; }
}

// ========== Place Sheet (Flow 1 + Flow 3 basics) ==========
function showPlaceSheet(payload) {
  if (payload) selectedPlace = payload;
  if (!selectedPlace) return;
  const el = document.getElementById('place-sheet');
  const p = selectedPlace;

  // Build meta line
  const metaParts = [];
  if (p.category) metaParts.push(p.category);
  if (p.address) {
    const short = p.address.split(',').slice(-2).join(',').trim();
    metaParts.push(short);
  }

  el.innerHTML = `
    <button class="sheet-close" onclick="closePlaceSheet()">${icon('close', 14)}</button>
    <div class="eyebrow">${metaParts.join(' \u00b7 ')}</div>
    <div class="place-name">${p.name}</div>
    ${p.address ? `<div class="place-desc">${p.address}</div>` : ''}
    ${p.properties?.phone ? `<div style="font-family:var(--font-ui);font-size:13px;margin-bottom:6px"><a href="tel:${p.properties.phone}" style="color:var(--forest-ink);text-decoration:underline">${p.properties.phone}</a></div>` : ''}
    ${p.properties?.website ? `<div style="font-family:var(--font-ui);font-size:13px;margin-bottom:6px"><a href="${p.properties.website}" target="_blank" rel="noopener" style="color:var(--forest-ink);text-decoration:underline">Website</a></div>` : ''}
    ${p.coordinates ? `<div style="font-family:var(--font-mono);font-size:10px;color:var(--fog-40);margin-bottom:12px">${p.coordinates[1].toFixed(5)}, ${p.coordinates[0].toFixed(5)}</div>` : ''}
    <div style="display:flex;gap:8px">
      <button class="btn-primary" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px" onclick="startDirectionsTo()">
        ${icon('compass', 16)} Directions
      </button>
      <button class="btn-secondary" onclick="startIsoFromPlace()" style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px">
        ${icon('clock', 14)} Reachable
      </button>
    </div>
  `;
  el.style.display = 'block';
  AppState.sheet.visible = true;
}

function closePlaceSheet() {
  document.getElementById('place-sheet').style.display = 'none';
  selectedPlace = null;
  clearMarkers();
  AppState.sheet.visible = false;
  if (AppState.mode === 'place') goTo('idle');
}

function startDirectionsTo() {
  if (!selectedPlace) return;
  const to = { name: selectedPlace.name, coords: selectedPlace.coordinates };
  const from = userPosition
    ? { name: 'Current location', coords: [userPosition.lng, userPosition.lat] }
    : { name: 'Map center', coords: [map.getCenter().lng, map.getCenter().lat] };
  clearMarkers();
  goTo('directions', { from, to });
}

function startIsoFromPlace() {
  if (!selectedPlace) return;
  const center = selectedPlace.coordinates;
  clearMarkers();
  goTo('isochrone', { center });
}

// ========== Map Click (Flow 1) ==========
function onMapClick(e) {
  if (AppState.mode === 'isochrone') {
    isoState.pin = [e.lngLat.lng, e.lngLat.lat];
    addIsochronePin();
    fetchIsochrone();
    return;
  }
  if (AppState.mode !== 'idle' && AppState.mode !== 'place') return;

  // Check for Mapbox Standard POI features first
  const poiLayers = ['poi-label'];
  const features = map.queryRenderedFeatures(e.point, { layers: poiLayers });

  if (features.length > 0) {
    const f = features[0];
    const props = f.properties || {};
    selectedPlace = {
      name: props.name || props.name_en || 'Place',
      address: props.address || '',
      category: props.category_en || props.type || props.maki || '',
      coordinates: [e.lngLat.lng, e.lngLat.lat],
      properties: props,
    };
    dropPlacePin([e.lngLat.lng, e.lngLat.lat]);
    goTo('place');
    return;
  }

  // Reverse geocode tap on empty map area
  reverseGeocodeAndShow(e.lngLat.lng, e.lngLat.lat);
}

function reverseGeocodeAndShow(lng, lat) {
  const token = TokenManager.get();
  fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?types=address,poi&limit=1&access_token=${encodeURIComponent(token)}`)
    .then(r => r.json())
    .then(data => {
      const feat = data.features?.[0];
      selectedPlace = {
        name: feat?.text || feat?.place_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`,
        address: feat?.place_name || '',
        category: feat?.properties?.category || '',
        coordinates: [lng, lat],
        properties: feat?.properties || {},
      };
      dropPlacePin([lng, lat]);
      goTo('place');
    })
    .catch(() => {
      // Even if geocode fails, drop a pin with coords
      selectedPlace = {
        name: `${lat.toFixed(4)}, ${lng.toFixed(4)}`,
        address: '',
        category: 'Dropped pin',
        coordinates: [lng, lat],
        properties: {},
      };
      dropPlacePin([lng, lat]);
      goTo('place');
    });
}

        <div id="dir-total-dist" style="font-family:var(--font-mono);font-size:13px;color:var(--fog-60)"></div>

function setDirectionsProfile(profile) {
  directionsState.profile = profile;
  document.querySelectorAll('#dir-mode-switcher button').forEach(btn => {
    btn.className = btn.getAttribute('data-profile') === profile ? 'active' : '';
  });
  if (directionsState.from?.coords && directionsState.to?.coords) {
    fetchDirections();
  }
}

function swapDirections() {
  [directionsState.from, directionsState.to] = [directionsState.to, directionsState.from];
  const fromEl = document.getElementById('dir-from-value');
  const toEl = document.getElementById('dir-to-value');
  if (fromEl) fromEl.textContent = directionsState.from?.name || 'Tap map to set';
  if (toEl) toEl.textContent = directionsState.to?.name || 'Tap map to set';
  if (directionsState.from?.coords && directionsState.to?.coords) fetchAllDirections();
}

async function fetchAllDirections() {
  const token = TokenManager.get();
  const from = directionsState.from.coords;
  const to = directionsState.to.coords;
  const profiles = [
    { id: 'driving-traffic', api: 'mapbox/driving-traffic', elId: 'dur-drive' },
    { id: 'cycling', api: 'mapbox/cycling', elId: 'dur-cycle' },
    { id: 'walking', api: 'mapbox/walking', elId: 'dur-walk' },
  ];
  profiles.forEach(async (p) => {
    try {
      const resp = await fetch(
        `https://api.mapbox.com/directions/v5/${p.api}/${from[0]},${from[1]};${to[0]},${to[1]}?steps=true&geometries=geojson&overview=full&access_token=${encodeURIComponent(token)}`
      );
      const data = await resp.json();
      const route = data.routes?.[0];
      if (!route) return;
      const durMin = Math.round(route.duration / 60);
      const el = document.getElementById(p.elId);
      if (el) el.textContent = durMin + ' min';
      if (p.id === directionsState.profile) updateDirectionsDisplay(route);
    } catch (e) { /* non-fatal */ }
  });
}

function updateDirectionsDisplay(route) {
  directionsState.geometry = route.geometry;
  directionsState.duration = route.duration;
  directionsState.distance = route.distance;
  directionsState.steps = route.legs?.[0]?.steps || [];

  const durMin = Math.round(route.duration / 60);
  const distKm = (route.distance / 1000).toFixed(1);

  const summaryEl = document.getElementById('dir-summary');
  if (summaryEl) summaryEl.style.display = 'block';
  const durEl = document.getElementById('dir-total-dur');
  if (durEl) durEl.textContent = durMin + ' min';
  const distEl = document.getElementById('dir-total-dist');
  if (distEl) distEl.textContent = distKm + ' km';
  const noteEl = document.getElementById('dir-note');
  if (noteEl) noteEl.textContent = directionsState.profile === 'driving-traffic' ? 'With current traffic conditions.' : '';

  const stepsEl = document.getElementById('dir-steps');
  if (stepsEl) {
    stepsEl.innerHTML = directionsState.steps.map((s, i) => `
      <div class="step-row" onclick="flyToStep(${i})" style="cursor:pointer">
        <div class="step-num ${i === 0 ? 'first' : ''}">${i + 1}</div>
        <div style="flex:1">
          <div class="step-text">${s.maneuver?.instruction || ''}</div>
          <div class="step-dist">${s.distance > 1000 ? (s.distance / 1000).toFixed(1) + ' km' : Math.round(s.distance) + ' m'}</div>
        </div>
      </div>
    `).join('');
    document.getElementById('dir-steps-container').style.display = 'block';
  }

  drawRoute(route.geometry);
  if (directionsState.profile === 'driving-traffic') fetchIncidents(route.geometry);
}

// Fly to a specific step maneuver (Flow 4 — tap-to-fly)
function flyToStep(index) {
  const step = directionsState.steps[index];
  if (!step?.maneuver?.location) return;
  map.flyTo({ center: step.maneuver.location, zoom: 17, duration: 400 });
}

async function fetchDirections() {
  const token = TokenManager.get();
  const from = directionsState.from.coords;
  const to = directionsState.to.coords;
  const profile = directionsState.profile === 'driving-traffic' ? 'mapbox/driving-traffic' : `mapbox/${directionsState.profile}`;

  try {
    const resp = await fetch(
      `https://api.mapbox.com/directions/v5/${profile}/${from[0]},${from[1]};${to[0]},${to[1]}?steps=true&geometries=geojson&overview=full&access_token=${encodeURIComponent(token)}`
    );
    const data = await resp.json();
    const route = data.routes?.[0];
    if (!route) return;
    updateDirectionsDisplay(route);
    const durElId = directionsState.profile === 'driving-traffic' ? 'dur-drive' : directionsState.profile === 'cycling' ? 'dur-cycle' : 'dur-walk';
    const durBtn = document.getElementById(durElId);
    if (durBtn) durBtn.textContent = Math.round(route.duration / 60) + ' min';
  } catch (e) {
    console.error('Directions error:', e);
  }
}

function drawRoute(geometry) {
  if (!map.getSource('route')) return;
  map.getSource('route').setData({ type: 'Feature', geometry });

  if (window._startMarker) window._startMarker.remove();
  if (window._endMarker) window._endMarker.remove();

  const startEl = document.createElement('div');
  startEl.style.cssText = 'width:16px;height:16px;border-radius:50%;background:#2E7DFF;border:3px solid var(--forest-ink);box-shadow:0 2px 6px rgba(0,0,0,.3)';
  window._startMarker = new mapboxgl.Marker({ element: startEl }).setLngLat(directionsState.from.coords).addTo(map);

  const endEl = document.createElement('div');
  endEl.style.cssText = 'width:16px;height:16px;border-radius:50%;background:var(--lime-signal);border:3px solid var(--forest-ink);box-shadow:0 2px 6px rgba(0,0,0,.3)';
  window._endMarker = new mapboxgl.Marker({ element: endEl }).setLngLat(directionsState.to.coords).addTo(map);
}

function previewRoute() {
  if (!directionsState.geometry) return;
  const coords = directionsState.geometry.coordinates;
  const bounds = coords.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(coords[0], coords[0]));
  map.fitBounds(bounds, { padding: { top: 80, bottom: 260, left: 60, right: 60 }, duration: 480 });
}

function closeDirections() {
  clearMapOverlays();
  goTo('idle');
}

function clearMapOverlays() {
  if (map && map.getSource('route')) {
    map.getSource('route').setData({ type: 'FeatureCollection', features: [] });
  }
  if (map && map.getSource('isochrone')) {
    map.getSource('isochrone').setData({ type: 'FeatureCollection', features: [] });
  }
  if (window._startMarker) { window._startMarker.remove(); window._startMarker = null; }
  if (window._endMarker) { window._endMarker.remove(); window._endMarker = null; }
  if (window._isoMarker) { window._isoMarker.remove(); window._isoMarker = null; }
  if (window._incidentMarkers) { window._incidentMarkers.forEach(m => m.remove()); window._incidentMarkers = []; }
  directionsState.geometry = null;
  directionsState.steps = [];
  incidents = [];
}

// ========== Incidents ==========
async function fetchIncidents(routeGeometry) {
  const token = TokenManager.get();
  if (!routeGeometry) return;

  const coords = routeGeometry.coordinates;
  let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
  coords.forEach(c => {
    if (c[0] < minLng) minLng = c[0]; if (c[0] > maxLng) maxLng = c[0];
    if (c[1] < minLat) minLat = c[1]; if (c[1] > maxLat) maxLat = c[1];
  });

  try {
    const resp = await fetch(
      `https://api.mapbox.com/incidents/v1/mapbox/traffic/${minLng},${minLat},${maxLng},${maxLat}?access_token=${encodeURIComponent(token)}`
    );
    if (!resp.ok) { incidents = []; return; }
    const data = await resp.json();
    incidents = (data.features || []).map(f => ({
      type: f.properties?.description || f.properties?.type || 'Incident',
      severity: ['minor', 'moderate', 'major'][Math.min(2, (f.properties?.severity || 1) - 1)] || 'minor',
      description: f.properties?.long_description || f.properties?.description || '',
      location: f.properties?.street || '',
      delay: f.properties?.delay ? Math.round(f.properties.delay / 60) + ' min' : '',
      coordinates: f.geometry?.coordinates?.[0] || f.geometry?.coordinates,
    })).filter(i => i.coordinates);

    if (window._incidentMarkers) window._incidentMarkers.forEach(m => m.remove());
    window._incidentMarkers = incidents.map(inc => {
      const colors = { major: { bg: '#C73A2D', ring: '#7A1F16' }, moderate: { bg: '#E09128', ring: '#7A4D10' }, minor: { bg: '#C8FF4C', ring: '#0B1F14' } };
      const c = colors[inc.severity] || colors.minor;
      const el = document.createElement('div');
      el.style.cssText = `width:22px;height:22px;border-radius:50%;background:${c.bg};border:2px solid ${c.ring};display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:12px;font-weight:800;color:${c.ring};box-shadow:0 2px 4px rgba(11,31,20,.3)`;
      el.textContent = '!';
      const coord = Array.isArray(inc.coordinates[0]) ? inc.coordinates[0] : inc.coordinates;
      return new mapboxgl.Marker({ element: el })
        .setLngLat(coord)
        .setPopup(new mapboxgl.Popup({ offset: 15 }).setHTML(`<strong>${inc.type}</strong><br>${inc.description}<br><small>${inc.location} ${inc.delay ? '&middot; +' + inc.delay : ''}</small>`))
        .addTo(map);
    });
  } catch (e) {
    console.error('Incidents error:', e);
    incidents = [];
  }
}

function showIncidentsSheet() {
  const el = document.getElementById('incidents-sheet');
  if (!incidents.length) {
    el.innerHTML = `
      <div class="eyebrow">Traffic along this route</div>
      <div class="sheet-title">No incidents</div>
      <div class="sheet-sub">Route is clear of reported incidents.</div>
    `;
    el.style.display = 'block';
    return;
  }

  el.innerHTML = `
    <div class="eyebrow">Traffic along this route</div>
    <div class="sheet-title">${incidents.length} incident${incidents.length > 1 ? 's' : ''} ahead</div>
    <div class="sheet-sub">Check route for delays.</div>
    <div>
      ${incidents.map(inc => `
        <div class="incident-row">
          <div class="sev-badge sev-${inc.severity}">!</div>
          <div style="flex:1">
            <div class="incident-type ${inc.severity}">${inc.type}</div>
            <div style="font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:-0.02em;color:var(--forest-ink);line-height:1.2;font-variation-settings:'opsz' 36">${inc.description}</div>
            <div style="font-family:var(--font-ui);font-size:12px;color:var(--fog-60);margin-top:4px">${inc.location}${inc.delay ? ' &middot; adds ' + inc.delay : ''}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  el.style.display = 'block';
}

// ========== Isochrone ==========
function showIsochroneSheet() {
  const el = document.getElementById('isochrone-sheet');
  el.innerHTML = `
    <div class="eyebrow">Isochrone &middot; ${isoState.pin ? 'Custom pin' : 'Your location'}</div>
    <div class="sheet-title">What's within <em style="font-style:italic;border-bottom:3px solid var(--lime-signal)">${isoState.minutes} minutes</em>?</div>
    <div class="sheet-sub">Tap the map to move the pin. See the reachable area by ${isoState.profile}.</div>

    <div class="mode-switcher">
      <button class="${isoState.profile === 'driving' ? 'active' : ''}" onclick="setIsoProfile('driving')">Drive</button>
      <button class="${isoState.profile === 'cycling' ? 'active' : ''}" onclick="setIsoProfile('cycling')">Cycle</button>
      <button class="${isoState.profile === 'walking' ? 'active' : ''}" onclick="setIsoProfile('walking')">Walk</button>
    </div>

    <div class="eyebrow" style="margin-bottom:8px">Travel time</div>
    <div class="time-pills">
      ${[5, 15, 30].map(t => `
        <button class="time-pill ${isoState.minutes === t && !isoState.showAll ? 'active' : ''}" onclick="setIsoTime(${t})">${t}<span class="unit"> min</span></button>
      `).join('')}
    </div>

    <button onclick="toggleIsoAll()" style="width:100%;padding:12px 14px;border-radius:var(--radius-button);border:1px solid rgba(11,31,20,.1);background:${isoState.showAll ? 'var(--forest-ink)' : 'var(--paper-raised)'};color:${isoState.showAll ? 'var(--lime-signal)' : 'var(--forest-ink)'};font-family:var(--font-ui);font-size:13px;font-weight:600;letter-spacing:-0.005em;display:flex;align-items:center;justify-content:center;gap:10px">
      <div style="width:18px;height:18px;border-radius:4px;border:2px solid currentColor;background:${isoState.showAll ? 'var(--lime-signal)' : 'transparent'};display:flex;align-items:center;justify-content:center;color:var(--forest-ink)">
        ${isoState.showAll ? '<svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"><path d="M4 12l6 6L20 6"/></svg>' : ''}
      </div>
      Show all contours (5, 15, 30)
    </button>

    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn-primary" style="flex:1" onclick="goTo('idle')">Keep on map</button>
      <button class="btn-secondary" onclick="startDirectionsFromIso()" style="display:flex;align-items:center;gap:6px;font-size:12px">${icon('compass', 14)} Directions from here</button>
      <button class="btn-secondary" onclick="clearMapOverlays();goTo('idle')">Clear</button>
    </div>
  `;
  el.style.display = 'block';
}

function startDirectionsFromIso() {
  if (!isoState.pin) return;
  const from = { name: 'Isochrone center', coords: isoState.pin };
  goTo('directions', { from });
}

function setIsoProfile(profile) {
  isoState.profile = profile;
  showIsochroneSheet();
  fetchIsochrone();
}

function setIsoTime(minutes) {
  isoState.minutes = minutes;
  isoState.showAll = false;
  showIsochroneSheet();
  fetchIsochrone();
}

function toggleIsoAll() {
  isoState.showAll = !isoState.showAll;
  showIsochroneSheet();
  fetchIsochrone();
}

function addIsochronePin() {
  if (window._isoMarker) window._isoMarker.remove();
  if (!isoState.pin) return;

  const el = document.createElement('div');
  el.innerHTML = `<div style="width:20px;height:20px;border-radius:50%;background:var(--lime-signal);border:3px solid var(--forest-ink);box-shadow:0 0 0 6px rgba(200,255,76,.25), 0 4px 10px rgba(11,31,20,.35)"></div><div style="width:2px;height:14px;background:var(--forest-ink);margin:0 auto"></div>`;
  window._isoMarker = new mapboxgl.Marker({ element: el, anchor: 'bottom', draggable: true })
    .setLngLat(isoState.pin)
    .addTo(map);

  window._isoMarker.on('dragend', () => {
    const lngLat = window._isoMarker.getLngLat();
    isoState.pin = [lngLat.lng, lngLat.lat];
    fetchIsochrone();
  });
}

async function fetchIsochrone() {
  const token = TokenManager.get();
  if (!isoState.pin) return;

  const minutes = isoState.showAll ? '5,15,30' : String(isoState.minutes);
  const profile = `mapbox/${isoState.profile}`;

  try {
    const resp = await fetch(
      `https://api.mapbox.com/isochrone/v1/${profile}/${isoState.pin[0]},${isoState.pin[1]}?contours_minutes=${minutes}&polygons=true&access_token=${encodeURIComponent(token)}`
    );
    const data = await resp.json();

    const colorMap = {
      5: { fill: 'rgba(200,255,76,.42)', stroke: 'rgba(11,31,20,.8)', opacity: 0.95 },
      15: { fill: 'rgba(159,207,46,.32)', stroke: 'rgba(159,207,46,.8)', opacity: 0.9 },
      30: { fill: 'rgba(58,110,82,.28)', stroke: 'rgba(58,110,82,.6)', opacity: 0.9 },
    };

    const features = (data.features || []).map(f => {
      const min = f.properties?.contour;
      const colors = colorMap[min] || colorMap[15];
      f.properties.fill = colors.fill;
      f.properties.stroke = colors.stroke;
      f.properties.opacity = colors.opacity;
      return f;
    });
    features.reverse();

    if (map.getSource('isochrone')) {
      map.getSource('isochrone').setData({ type: 'FeatureCollection', features });
    }
  } catch (e) {
    console.error('Isochrone error:', e);
  }
}

// ========== Layers ==========
function showLayersSheet() {
  const el = document.getElementById('layers-sheet');
  const vibes = [
    { id: 'day', label: 'Day', bg: '#D6E4CF', fg: '#0B1F14', sw: '#C8FF4C' },
    { id: 'warm', label: 'Warm', bg: '#F0E8D4', fg: '#2E2C26', sw: '#FFB547' },
    { id: 'dusk', label: 'Dusk', bg: '#2A2340', fg: '#F2EFE6', sw: '#FFB547' },
    { id: 'trailhead', label: 'Trailhead', bg: '#C9D2B9', fg: '#2B3321', sw: '#C84B2E' },
    { id: 'aviator', label: 'Aviator', bg: '#F3E4C8', fg: '#3A2A1C', sw: '#E85A2C' },
  ];

  el.innerHTML = `
    <div class="eyebrow">Map</div>
    <div class="sheet-title">Layers &amp; vibes</div>

    <div class="eyebrow" style="margin-bottom:8px">Vibe</div>
    <div class="vibe-grid">
      ${vibes.map(v => `
        <button class="vibe-card ${currentVibe === v.id ? 'active' : ''}" style="background:${v.bg};color:${v.fg}" onclick="setVibe('${v.id}')">
          <div class="vibe-dot" style="background:${v.sw};border:2px solid ${v.fg}"></div>
          <div class="vibe-name">${v.label}</div>
        </button>
      `).join('')}
    </div>

    <div class="toggle-row">
      <div style="flex:1"><div class="toggle-row-label">3D buildings</div><div class="toggle-row-sub">Isometric extrusions</div></div>
      <button class="toggle ${show3D ? 'on' : ''}" onclick="toggle3D()"><div class="knob"></div></button>
    </div>
    <div class="toggle-row">
      <div style="flex:1"><div class="toggle-row-label">Terrain</div><div class="toggle-row-sub">Subtle elevation shading</div></div>
      <button class="toggle ${showTerrain ? 'on' : ''}" onclick="toggleTerrain()"><div class="knob"></div></button>
    </div>
    <div class="toggle-row" style="border-bottom:none">
      <div style="flex:1"><div class="toggle-row-label">Live traffic</div><div class="toggle-row-sub">Driving-traffic profile</div></div>
      <button class="toggle ${showTraffic ? 'on' : ''}" onclick="toggleTrafficLayer()"><div class="knob"></div></button>
    </div>

    <div style="margin-top:16px">
      <button class="btn-secondary" style="width:100%" onclick="goTo('idle')">Close</button>
    </div>

    <div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(11,31,20,.08)">
      <div class="eyebrow" style="margin-bottom:6px">API Token</div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--fog-40);margin-bottom:8px">${TokenManager.mask(TokenManager.get())}</div>
      <button onclick="clearToken()" style="font-family:var(--font-ui);font-size:12px;color:#C73A2D;text-decoration:underline">Clear token &amp; re-enter</button>
    </div>
  `;
  el.style.display = 'block';
}

function setVibe(id) { applyVibe(id); showLayersSheet(); }
function toggle3D() { show3D = !show3D; localStorage.setItem('vibemaps_3d', show3D); try { map.setConfigProperty('basemap', 'show3dObjects', show3D); } catch (e) {} showLayersSheet(); }
function toggleTerrain() { showTerrain = !showTerrain; localStorage.setItem('vibemaps_terrain', showTerrain); try { map.setConfigProperty('basemap', 'showTerrain', showTerrain); } catch (e) {} showLayersSheet(); }
function toggleTrafficLayer() { showTraffic = !showTraffic; localStorage.setItem('vibemaps_traffic', showTraffic); showLayersSheet(); }
function clearToken() { TokenManager.clear(); window.location.reload(); }

// ========== Recenter ==========
function recenter() {
  if (userPosition) {
    map.flyTo({ center: [userPosition.lng, userPosition.lat], zoom: 15, duration: 400 });
  } else {
    geoControl.trigger();
  }
}

// ========== Init ==========
setupSearch();
checkToken();
</script>
</body>
</html>
